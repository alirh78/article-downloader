name: Download Pages & Extract Article Links

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install beautifulsoup4 requests urllib3 selenium webdriver-manager
          sudo apt-get update
          sudo apt-get install -y wget curl unzip
      
      # Step 5: Download web pages with proper browser headers
      - name: Download web pages with all assets
        run: |
          # ============================================
          # 🔽 YOUR URLs
          # ============================================
          
          urls=(
            "https://www.sciencedirect.com/science/article/pii/S0022395624004928"
            "https://www.mdpi.com/2313-7673/8/6/475"
            "https://www.sciencedirect.com/science/article/pii/S2949903824000010"
            "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0262527"
            "https://ieeexplore.ieee.org/abstract/document/8417207/"
            "https://academic.oup.com/acn/article-abstract/34/2/222/4951483"
            "https://ieeexplore.ieee.org/abstract/document/10969487/"
          )
          
          # Create a user-agent that looks like a real browser
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          for url in "${urls[@]}"; do
            # Create a safe folder name
            folder_name=$(echo "$url" | sed 's|https\?://||' | sed 's|/|_|g' | sed 's/[^a-zA-Z0-9_-]/_/g' | cut -c1-100)
            
            echo "========================================="
            echo "Downloading: $url"
            echo "Saving to: downloaded-pages/$folder_name/"
            echo "========================================="
            
            mkdir -p "downloaded-pages/$folder_name"
            
            # Try with wget and browser headers
            wget \
              --user-agent="$USER_AGENT" \
              --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
              --header="Accept-Language: en-US,en;q=0.5" \
              --header="Accept-Encoding: gzip, deflate, br" \
              --header="Connection: keep-alive" \
              --header="Upgrade-Insecure-Requests: 1" \
              --recursive \
              --level=1 \
              --page-requisites \
              --adjust-extension \
              --span-hosts \
              --convert-links \
              --no-directories \
              --directory-prefix="downloaded-pages/$folder_name" \
              --no-host-directories \
              --timeout=30 \
              --tries=3 \
              --retry-connrefused \
              "$url" 2>&1 | tee -a wget-log.txt
            
            # Check if download was successful
            if [ -f "downloaded-pages/$folder_name/index.html" ] || [ -f "downloaded-pages/$folder_name/*.html" ]; then
              echo "✅ Successfully downloaded: $url"
            else
              echo "⚠️ Wget may have failed, trying with curl as fallback..."
              
              # Fallback to curl with browser headers
              curl -L \
                -H "User-Agent: $USER_AGENT" \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
                -H "Accept-Language: en-US,en;q=0.5" \
                --max-time 60 \
                --retry 3 \
                -o "downloaded-pages/$folder_name/page.html" \
                "$url"
              
              if [ -f "downloaded-pages/$folder_name/page.html" ]; then
                echo "✅ Curl fallback succeeded for: $url"
              else
                echo "❌ Both wget and curl failed for: $url"
              fi
            fi
            
            echo "Finished: $url"
            echo ""
          done
          
          echo "✅ All pages downloaded!"
          
          # List what we actually downloaded
          echo ""
          echo "Downloaded files:"
          find downloaded-pages/ -type f -name "*.html" | head -20
      
      # Step 6: Enhanced Python extraction with better link detection
      - name: Extract article links with Python
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import re
          from pathlib import Path
          from urllib.parse import urljoin, urlparse
          from bs4 import BeautifulSoup
          from datetime import datetime
          
          # Results storage
          all_links = []
          pdf_links = []
          article_links = []
          download_links = []
          
          # Walk through all downloaded HTML files
          pages_dir = Path('downloaded-pages')
          output_dir = Path('extracted-links')
          output_dir.mkdir(exist_ok=True)
          
          print("🔍 Scanning downloaded pages for links...")
          print("-" * 50)
          
          html_files = list(pages_dir.rglob('*.html'))
          print(f"Found {len(html_files)} HTML files to analyze")
          
          if len(html_files) == 0:
              print("⚠️ WARNING: No HTML files found! Checking directory contents...")
              print("Contents of downloaded-pages:")
              for item in pages_dir.rglob('*'):
                  print(f"  - {item}")
          
          for html_file in html_files:
              print(f"📄 Analyzing: {html_file}")
              
              try:
                  with open(html_file, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                      
                      # Check if the page is an error page
                      if "access denied" in content.lower() or "blocked" in content.lower() or "captcha" in content.lower():
                          print(f"  ⚠️  This page appears to be blocked: {html_file}")
                          continue
                      
                      soup = BeautifulSoup(content, 'html.parser')
                      
                      # Find all links
                      links_found = 0
                      for link in soup.find_all('a', href=True):
                          href = link.get('href')
                          text = link.get_text(strip=True)
                          
                          # Skip empty or javascript links
                          if not href or href.startswith('#') or href.startswith('javascript:'):
                              continue
                          
                          # Convert relative URLs to absolute
                          if not href.startswith('http'):
                              href = urljoin(str(html_file.parent), href)
                          
                          # Store the link info
                          link_info = {
                              'source_file': str(html_file),
                              'url': href,
                              'text': text[:100]
                          }
                          all_links.append(link_info)
                          links_found += 1
                          
                          # Check for PDFs
                          if '.pdf' in href.lower():
                              pdf_links.append(link_info)
                              print(f"  📑 Found PDF: {href}")
                          
                          # Check for article patterns (expanded for academic sites)
                          article_patterns = [
                              'article', 'post', 'news', 'story', 'content', 
                              'entry', 'blog', 'doi', 'abstract', 'fulltext',
                              'pdf', 'download', 'epub', 'science/article',
                              'pii/', 'mdpi/', 'plos', 'ieee', 'oup'
                          ]
                          if any(pattern in href.lower() for pattern in article_patterns):
                              # Avoid duplicates
                              if link_info not in article_links:
                                  article_links.append(link_info)
                                  if links_found < 50:  # Only print first 50
                                      print(f"  📰 Found: {href[:80]}...")
                          
                          # Check for download patterns
                          if any(ext in href.lower() for ext in ['.zip', '.rar', '.doc', '.docx', '.epub', '.mobi', '.pdf']):
                              if link_info not in download_links:
                                  download_links.append(link_info)
                      
                      print(f"  Found {links_found} links in this page")
                              
              except Exception as e:
                  print(f"  ⚠️  Error reading {html_file}: {e}")
          
          print("-" * 50)
          print(f"✅ Scan complete!")
          print(f"   Total HTML files analyzed: {len(html_files)}")
          print(f"   Total links found: {len(all_links)}")
          print(f"   PDF files: {len(pdf_links)}")
          print(f"   Article links: {len(article_links)}")
          print(f"   Download links: {len(download_links)}")
          
          # Save results to files
          timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          
          # 1. All links
          with open(output_dir / 'all_links.txt', 'w', encoding='utf-8') as f:
              f.write(f"ALL LINKS FOUND - {timestamp}\n")
              f.write("=" * 70 + "\n\n")
              for link in all_links:
                  f.write(f"Source: {link['source_file']}\n")
                  f.write(f"URL: {link['url']}\n")
                  f.write(f"Text: {link['text']}\n")
                  f.write("-" * 50 + "\n")
          
          # 2. PDF links only
          with open(output_dir / 'pdf_links.txt', 'w', encoding='utf-8') as f:
              f.write(f"PDF FILES FOUND - {timestamp}\n")
              f.write("=" * 70 + "\n\n")
              for link in pdf_links:
                  f.write(f"Source: {link['source_file']}\n")
                  f.write(f"PDF URL: {link['url']}\n")
                  f.write(f"Link text: {link['text']}\n")
                  f.write("-" * 50 + "\n")
          
          # 3. Article links only
          with open(output_dir / 'article_links.txt', 'w', encoding='utf-8') as f:
              f.write(f"ARTICLE LINKS FOUND - {timestamp}\n")
              f.write("=" * 70 + "\n\n")
              for link in article_links:
                  f.write(f"Source: {link['source_file']}\n")
                  f.write(f"Article URL: {link['url']}\n")
                  f.write(f"Title/Text: {link['text']}\n")
                  f.write("-" * 50 + "\n")
          
          # 4. Summary report
          with open(output_dir / 'SUMMARY.txt', 'w', encoding='utf-8') as f:
              f.write("=" * 70 + "\n")
              f.write("DOWNLOAD SUMMARY REPORT\n")
              f.write(f"Generated: {timestamp}\n")
              f.write("=" * 70 + "\n\n")
              f.write(f"📊 STATISTICS:\n")
              f.write(f"   • HTML files analyzed: {len(html_files)}\n")
              f.write(f"   • Total links found: {len(all_links)}\n")
              f.write(f"   • PDF documents: {len(pdf_links)}\n")
              f.write(f"   • Article links: {len(article_links)}\n")
              f.write(f"   • Other downloads: {len(download_links)}\n\n")
              
              if len(html_files) == 0:
                  f.write("⚠️ WARNING: No HTML files were downloaded!\n")
                  f.write("This usually means the websites are blocking automated access.\n")
                  f.write("Try:\n")
                  f.write("1. Checking if the URLs are accessible in a regular browser\n")
                  f.write("2. Adding cookies or authentication tokens\n")
                  f.write("3. Using a different approach (some academic sites require login)\n\n")
              
              if pdf_links:
                  f.write("📑 PDF FILES:\n")
                  for i, link in enumerate(pdf_links[:10], 1):
                      f.write(f"   {i}. {link['url']}\n")
                  if len(pdf_links) > 10:
                      f.write(f"   ... and {len(pdf_links) - 10} more\n")
                  f.write("\n")
              
              if article_links:
                  f.write("📰 ARTICLE LINKS:\n")
                  for i, link in enumerate(article_links[:10], 1):
                      f.write(f"   {i}. {link['url']}\n")
                  if len(article_links) > 10:
                      f.write(f"   ... and {len(article_links) - 10} more\n")
          
          print("\n✅ Reports saved to 'extracted-links/' folder:")
          print("   • all_links.txt - Every link found")
          print("   • article_links.txt - Article URLs only")
          print("   • pdf_links.txt - PDF files")
          print("   • SUMMARY.txt - Quick overview")
          
          PYTHON_SCRIPT
      
      # Step 7: Commit and save everything
      - name: Commit and push all files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git add downloaded-pages/
          git add extracted-links/
          git add pdfs/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Downloaded pages and extracted links on $(date)"
            git push
            echo "✅ Changes pushed successfully!"
          fi
      
      # Step 8: Display summary
      - name: Display summary
        run: |
          echo "========================================="
          echo "🎉 WORKFLOW COMPLETED!"
          echo "========================================="
          echo ""
          echo "📊 RESULTS:"
          echo "   Check extracted-links/SUMMARY.txt for details"
          echo ""
          echo "📁 FOLDERS CREATED:"
          echo "   • downloaded-pages/ - Downloaded HTML files"
          echo "   • extracted-links/ - Extracted links and reports"
          echo ""
          echo "⚠️ IMPORTANT NOTE ABOUT ACADEMIC SITES:"
          echo "   Many academic publishers block automated downloads."
          echo "   If no files were downloaded, you may need to:"
          echo "   1. Access from a recognized IP (university network)"
          echo "   2. Use institutional login cookies"
          echo "   3. Try alternative URLs (abstract pages vs. full text)"
