<!DOCTYPE html>
<html>
<head>
    <title>Downloaded Articles Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #333; }
        h2 { color: #666; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .section { margin: 30px 0; }
        .link-item { margin: 10px 0; padding: 10px; background: #f9f9f9; border-left: 4px solid #007bff; }
        .pdf { border-left-color: #dc3545; }
        .article { border-left-color: #28a745; }
        .url { word-break: break-all; font-family: monospace; }
        .source { font-size: 12px; color: #999; margin-top: 5px; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-box { background: #007bff; color: white; padding: 15px; border-radius: 8px; text-align: center; flex: 1; }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Downloaded Pages & Extracted Links</h1>
        <p>Report generated by GitHub Action</p>
        
        <div class="stats" id="stats"></div>
        
        <div class="section">
            <h2>📑 PDF Documents</h2>
            <div id="pdf-links"></div>
        </div>
        
        <div class="section">
            <h2>📰 Article Links</h2>
            <div id="article-links"></div>
        </div>
        
        <div class="section">
            <h2>⬇️ Downloadable Files</h2>
            <div id="download-links"></div>
        </div>
    </div>
    
    <script>
        // Load the text files and display them
        async function loadLinks() {
            try {
                const pdfRes = await fetch('pdf_links.txt');
                const pdfText = await pdfRes.text();
                displayLinks(pdfText, 'pdf-links', 'pdf');
                
                const articleRes = await fetch('article_links.txt');
                const articleText = await articleRes.text();
                displayLinks(articleText, 'article-links', 'article');
                
                const downloadRes = await fetch('download_links.txt');
                const downloadText = await downloadRes.text();
                displayLinks(downloadText, 'download-links', 'download');
                
                // Update stats
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box"><div class="stat-number">${(pdfText.match(/PDF URL:/g) || []).length}</div><div class="stat-label">PDF Files</div></div>
                    <div class="stat-box"><div class="stat-number">${(articleText.match(/Article URL:/g) || []).length}</div><div class="stat-label">Article Links</div></div>
                    <div class="stat-box"><div class="stat-number">${(downloadText.match(/File URL:/g) || []).length}</div><div class="stat-label">Downloads</div></div>
                `;
            } catch(e) {
                console.error('Error loading links:', e);
            }
        }
        
        function displayLinks(text, containerId, type) {
            const container = document.getElementById(containerId);
            const lines = text.split('\n');
            let currentItem = null;
            let html = '';
            
            for (let line of lines) {
                if (line.startsWith('PDF URL:') || line.startsWith('Article URL:') || line.startsWith('File URL:')) {
                    if (currentItem) html += renderItem(currentItem, type);
                    currentItem = { url: line.split(':')[1].trim(), source: '', text: '' };
                } else if (line.startsWith('Source:')) {
                    if (currentItem) currentItem.source = line.split(':')[1].trim();
                } else if (line.startsWith('Link text:') || line.startsWith('Title/Text:')) {
                    if (currentItem) currentItem.text = line.split(':')[1].trim();
                }
            }
            if (currentItem) html += renderItem(currentItem, type);
            
            container.innerHTML = html || '<p>No links found</p>';
        }
        
        function renderItem(item, type) {
            const typeClass = type === 'pdf' ? 'pdf' : (type === 'article' ? 'article' : '');
            return `
                <div class="link-item ${typeClass}">
                    <div class="url"><a href="${item.url}" target="_blank">${item.url}</a></div>
                    <div class="source">From: ${item.source}</div>
                    ${item.text ? `<div class="source">Link text: ${item.text}</div>` : ''}
                </div>
            `;
        }
        
        loadLinks();
    </script>
</body>
</html>
